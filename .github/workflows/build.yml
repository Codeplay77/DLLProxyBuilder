name: Build EXE

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install pyinstaller pefile

      - name: Build onefile exe
        run: pyinstaller --onefile --console --name dll_proxy_generator dll_proxy_generator.py

      - uses: actions/upload-artifact@v4
        with:
          name: dll_proxy_generator
          path: dist/dll_proxy_generator.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/dll_proxy_generator.exe
